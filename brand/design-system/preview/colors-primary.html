<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Quicksand',sans-serif; background:#f4f4f4; padding:16px; }
.grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.swatch { border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.12); }
.color { height:64px; }
.label { background:#fff; padding:6px 8px; }
.name { font-size:11px; font-weight:700; color:#333; }
.hex  { font-size:10px; color:#888; margin-top:1px; }
.section-title { font-size:11px; font-weight:700; color:#555; letter-spacing:0.08em; text-transform:uppercase; margin:12px 0 6px; }
</style>
</head><body>
<div class="section-title">Blues</div>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#C8EEF5"></div><div class="label"><div class="name">Blue 100</div><div class="hex">#C8EEF5</div></div></div>
  <div class="swatch"><div class="color" style="background:#45C3F5"></div><div class="label"><div class="name">Blue 300</div><div class="hex">#45C3F5</div></div></div>
  <div class="swatch"><div class="color" style="background:#29ABE2"></div><div class="label"><div class="name">Blue 400 ★</div><div class="hex">#29ABE2</div></div></div>
</div>
<div class="section-title">Oranges</div>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#FDE8C8"></div><div class="label"><div class="name">Orange 100</div><div class="hex">#FDE8C8</div></div></div>
  <div class="swatch"><div class="color" style="background:#F9A94C"></div><div class="label"><div class="name">Orange 300</div><div class="hex">#F9A94C</div></div></div>
  <div class="swatch"><div class="color" style="background:#F7941D"></div><div class="label"><div class="name">Orange 400 ★</div><div class="hex">#F7941D</div></div></div>
</div>
<div class="section-title">Yellow / Gold</div>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#FEF9D0"></div><div class="label"><div class="name">Yellow 100</div><div class="hex">#FEF9D0</div></div></div>
  <div class="swatch"><div class="color" style="background:#FDE98A"></div><div class="label"><div class="name">Yellow 200</div><div class="hex">#FDE98A</div></div></div>
  <div class="swatch"><div class="color" style="background:#F9C923"></div><div class="label"><div class="name">Yellow 400 ★</div><div class="hex">#F9C923</div></div></div>
</div>
</body></html>
