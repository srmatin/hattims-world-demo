<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:radial-gradient(ellipse at center,#45C3F5 0%,#0A7DB5 100%); padding:24px; display:flex; flex-direction:column; gap:16px; align-items:center; }
.label { font-family:'Quicksand',sans-serif; font-size:10px; font-weight:700; color:rgba(255,255,255,0.6); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; text-align:center; }
.field-wrap { width:340px; }
input {
  font-family:'Quicksand',sans-serif; font-size:17px; font-weight:500;
  color:#0A7DB5; background:#fff; border:none; border-radius:50px;
  padding:14px 24px; width:100%; text-align:center; outline:none;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
input::placeholder { color:rgba(10,125,181,0.4); }
</style>
</head><body>
<div class="field-wrap">
  <div class="label">Input — Default (empty)</div>
  <input type="email" placeholder="Email Address" />
</div>
<div class="field-wrap">
  <div class="label">Input — Filled</div>
  <input type="email" value="parent@email.com" />
</div>
</body></html>
