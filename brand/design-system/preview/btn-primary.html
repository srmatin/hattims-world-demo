<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:radial-gradient(ellipse at center,#45C3F5 0%,#0A7DB5 100%); padding:24px; display:flex; flex-direction:column; gap:16px; align-items:flex-start; }
.label { font-family:'Quicksand',sans-serif; font-size:10px; font-weight:700; color:rgba(255,255,255,0.6); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; }
.btn {
  font-family:'Quicksand',sans-serif; font-size:18px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase; color:#fff;
  background:#F7941D; border:none; border-radius:50px;
  padding:14px 60px; box-shadow:0 4px 0 rgba(0,0,0,0.25);
  cursor:pointer; transition:background 0.15s, transform 0.1s;
  display:inline-block;
}
.btn:hover { background:#E07010; }
.btn.wide { padding:14px 100px; }
.btn.sm { font-size:14px; padding:10px 40px; }
.row { display:flex; gap:12px; align-items:center; }
</style>
</head><body>
<div>
  <div class="label">Primary CTA — large</div>
  <div class="btn wide">Next</div>
</div>
<div>
  <div class="label">Primary CTA — default</div>
  <div class="btn">Get Started</div>
</div>
<div>
  <div class="label">Primary CTA — small</div>
  <div class="btn sm">Let's Play</div>
</div>
</body></html>
