<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face {
  font-family: 'Quicksand';
  src: url('../fonts/Quicksand-VariableFont_wght.ttf') format('truetype');
  font-weight: 300 700;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:radial-gradient(ellipse at center, #45C3F5 0%, #0A7DB5 100%); padding:20px; min-height:300px; }
.row { margin-bottom:18px; }
.label { font-family:'Quicksand',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-bottom:4px; }
.display-title {
  font-family:'Quicksand',sans-serif;
  font-size:72px; font-weight:700;
  letter-spacing:0.04em; text-transform:uppercase;
  color:#F9C923;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.3), 5px 5px 0 rgba(0,0,0,0.15);
  line-height:1;
}
.section-title {
  font-family:'Quicksand',sans-serif;
  font-size:48px; font-weight:700;
  letter-spacing:0.04em; text-transform:uppercase;
  color:#F9C923;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
  line-height:1;
}
.screen-heading {
  font-family:'Quicksand',sans-serif;
  font-size:28px; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase;
  color:#fff; line-height:1.2;
}
</style>
</head><body>
<div class="row">
  <div class="label">Display Title — Quicksand 700 72px (brand font ✓)</div>
  <div class="display-title">Lesson One</div>
</div>
<div class="row">
  <div class="label">Section Title — Quicksand 700 48px (brand font ✓)</div>
  <div class="section-title">Movie Time</div>
</div>
<div class="row">
  <div class="label">Screen Heading — Quicksand 700 28px (brand font ✓)</div>
  <div class="screen-heading">Enter your email to get started</div>
</div>
</body></html>
