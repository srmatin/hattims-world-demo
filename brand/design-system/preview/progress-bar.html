<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:radial-gradient(ellipse at center,#45C3F5 0%,#0A7DB5 100%); padding:24px 20px; display:flex; flex-direction:column; gap:20px; }
.label { font-family:'Quicksand',sans-serif; font-size:10px; font-weight:700; color:rgba(255,255,255,0.6); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
.bar-wrap { position:relative; width:460px; margin-right:32px; }
.track { height:14px; background:rgba(255,255,255,0.3); border-radius:50px; overflow:visible; position:relative; }
.fill { height:14px; background:#F7941D; border-radius:50px; width:62%; position:relative; }
.thumb {
  position:absolute; right:-24px; top:50%; transform:translateY(-50%);
  width:48px; height:48px;
  background: #F9C923 url('../assets/hattim-thumbsup.png') center/165% no-repeat;
  border-radius:50%;
  border:3px solid #fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
/* Hattim thumb — yellow circle */
.hattim-thumb {
  position:absolute; right:-24px; top:50%; transform:translateY(-50%);
  width:48px; height:48px;
  background: #F9C923 url('../assets/hattim-thumbsup.png') center/165% no-repeat;
  border-radius:50%;
  border:3px solid #fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.stars { display:flex; gap:8px; align-items:center; }
.star { font-size:36px; }
.star.lit { filter:drop-shadow(0 2px 4px rgba(249,201,35,0.6)); }
.star.dim { filter:grayscale(1) opacity(0.4); }
</style>
</head><body>
<div>
  <div class="label">Progress Bar (62% complete)</div>
  <div class="bar-wrap">
    <div class="track">
      <div class="fill">
        <div class="hattim-thumb"></div>
      </div>
    </div>
  </div>
</div>
<div>
  <div class="label">Star Rating — 1 of 3</div>
  <div class="stars">
    <span class="star lit">⭐</span>
    <span class="star dim">⭐</span>
    <span class="star dim">⭐</span>
  </div>
</div>
<div>
  <div class="label">Star Rating — 3 of 3 (full)</div>
  <div class="stars">
    <span class="star lit">⭐</span>
    <span class="star lit">⭐</span>
    <span class="star lit">⭐</span>
  </div>
</div>
</body></html>
