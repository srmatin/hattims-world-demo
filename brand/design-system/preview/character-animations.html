<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face { font-family:'Quicksand'; src:url('../fonts/Quicksand-VariableFont_wght.ttf') format('truetype'); font-weight:300 700; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#fff; padding:20px; font-family:'Quicksand',sans-serif; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
.item { display:flex; flex-direction:column; align-items:center; gap:8px; }
video {
  width:160px; height:160px; object-fit:contain;
  border-radius:12px; background:#f0f8ff;
  cursor:pointer;
}
.name { font-size:11px; font-weight:700; color:#444; letter-spacing:0.08em; text-transform:uppercase; text-align:center; }
.filename { font-size:9px; color:#bbb; text-align:center; }
.hint { font-size:10px; color:#aaa; text-align:center; margin-bottom:12px; }
</style>
</head><body>
<div class="hint">Click any animation to play / pause</div>
<div class="grid">
  <div class="item">
    <video src="../assets/anim-idle.webm" loop playsinline onclick="this.paused?this.play():this.pause()" autoplay muted></video>
    <div class="name">Idle</div><div class="filename">anim-idle.webm</div>
  </div>
  <div class="item">
    <video src="../assets/anim-wave.webm" loop playsinline onclick="this.paused?this.play():this.pause()" autoplay muted></video>
    <div class="name">Wave</div><div class="filename">anim-wave.webm</div>
  </div>
  <div class="item">
    <video src="../assets/anim-excited.webm" loop playsinline onclick="this.paused?this.play():this.pause()" autoplay muted></video>
    <div class="name">Excited</div><div class="filename">anim-excited.webm</div>
  </div>
  <div class="item">
    <video src="../assets/anim-thumbsup.webm" loop playsinline onclick="this.paused?this.play():this.pause()" autoplay muted></video>
    <div class="name">Thumbs Up</div><div class="filename">anim-thumbsup.webm</div>
  </div>
  <div class="item">
    <video src="../assets/anim-eat.webm" loop playsinline onclick="this.paused?this.play():this.pause()" autoplay muted></video>
    <div class="name">Eat / Hungry</div><div class="filename">anim-eat.webm</div>
  </div>
  <div class="item">
    <video src="../assets/anim-cheerup.webm" loop playsinline onclick="this.paused?this.play():this.pause()" autoplay muted></video>
    <div class="name">Cheer Up</div><div class="filename">anim-cheerup.webm</div>
  </div>
  <div class="item">
    <video src="../assets/anim-pointing.webm" loop playsinline onclick="this.paused?this.play():this.pause()" autoplay muted></video>
    <div class="name">Pointing</div><div class="filename">anim-pointing.webm</div>
  </div>
</div>
</body></html>
