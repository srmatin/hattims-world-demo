<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:radial-gradient(ellipse at center,#45C3F5 0%,#0A7DB5 100%); padding:20px; display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; }
.label { font-family:'Quicksand',sans-serif; font-size:10px; font-weight:700; color:rgba(255,255,255,0.6); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
.card { background:rgba(255,255,255,0.12); border-radius:14px; padding:16px 20px; }
.palette { display:flex; gap:6px; margin-top:6px; }
.dot { width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,255,255,0.4); }
</style>
</head><body>

<div class="card">
  <div class="label">Wordmark (brand asset ✓)</div>
  <img src="../assets/wordmark.png" style="height:100px;object-fit:contain;display:block" />
</div>

<div class="card">
  <div class="label">Full Logo (with character)</div>
  <img src="../assets/logo-with-character.png" style="height:140px;object-fit:contain;display:block;border-radius:8px" />
</div>

<div class="card">
  <div class="label">Brand Palette</div>
  <div class="palette">
    <div class="dot" style="background:#29ABE2" title="Sky Blue"></div>
    <div class="dot" style="background:#F7941D" title="Orange"></div>
    <div class="dot" style="background:#F9C923" title="Yellow"></div>
    <div class="dot" style="background:#7BC044" title="Green"></div>
    <div class="dot" style="background:#7B4FAF" title="Purple"></div>
    <div class="dot" style="background:#E8392A" title="Red"></div>
    <div class="dot" style="background:#fff" title="White"></div>
  </div>
  <div style="margin-top:8px;font-family:'Quicksand',sans-serif;font-size:10px;color:rgba(255,255,255,0.5)">Blue · Orange · Gold · Green · Purple · Red</div>
</div>

</body></html>
