<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hattim's World — Web App UI Kit</title>
<!-- All type uses Quicksand (brand-supplied variable font) -->
<style>
  @font-face {
    font-family: 'Quicksand';
    src: url('../../fonts/Quicksand-VariableFont_wght.ttf') format('truetype');
    font-weight: 300 700;
    font-display: swap;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body, #root { width:100%; height:100%; overflow:hidden; }
  body { background:#111; display:flex; align-items:center; justify-content:center; font-family:'Quicksand',sans-serif; }

  /* App shell — 1024×768 tablet-ish */
  #app-shell {
    width:1024px; height:768px;
    border-radius:4px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    position:relative;
  }

  /* Screen nav dots */
  #nav-dots {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:100;
  }
  .dot {
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,0.35); cursor:pointer;
    transition:background 0.2s, transform 0.2s;
    border:none;
  }
  .dot.active { background:#F7941D; transform:scale(1.3); }

  /* Screen label */
  #screen-label {
    position:fixed; top:12px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.5); color:rgba(255,255,255,0.7);
    font-family:'Quicksand',sans-serif; font-size:11px; font-weight:600;
    letter-spacing:0.1em; text-transform:uppercase;
    padding:4px 14px; border-radius:20px; pointer-events:none; z-index:100;
  }
</style>
</head>
<body>
<div id="app-shell"></div>
<div id="nav-dots"></div>
<div id="screen-label"></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
const SCREENS = [
  { label:'Splash', component: SplashScreen },
  { label:'Login', component: LoginScreen },
  { label:'Profile', component: ProfileScreen },
  { label:'Movie Time', component: MovieTimeScreen },
  { label:'Lesson Intro', component: LessonIntroScreen },
  { label:'Quiz', component: QuizScreen },
  { label:'Game Time', component: GameTimeScreen },
  { label:'Activity', component: ActivityScreen },
];

const STORAGE_KEY = 'hw_ui_kit_screen';

function App() {
  const [idx, setIdx] = React.useState(() => {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? Math.min(parseInt(saved), SCREENS.length-1) : 0;
  });

  const goTo = React.useCallback((n) => {
    const next = Math.max(0, Math.min(SCREENS.length-1, n));
    setIdx(next);
    localStorage.setItem(STORAGE_KEY, next);
    // update label
    document.getElementById('screen-label').textContent = SCREENS[next].label;
    // update dots
    document.querySelectorAll('.dot').forEach((d,i) => {
      d.classList.toggle('active', i===next);
    });
  }, []);

  const next = React.useCallback(() => goTo(idx+1), [idx, goTo]);

  // Keyboard nav
  React.useEffect(() => {
    const handler = (e) => {
      if (e.key==='ArrowRight'||e.key==='ArrowDown') goTo(idx+1);
      if (e.key==='ArrowLeft'||e.key==='ArrowUp') goTo(idx-1);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [idx, goTo]);

  // Init label + dots
  React.useEffect(() => {
    document.getElementById('screen-label').textContent = SCREENS[idx].label;
    const dotsEl = document.getElementById('nav-dots');
    dotsEl.innerHTML = '';
    SCREENS.forEach((_,i) => {
      const d = document.createElement('button');
      d.className = 'dot' + (i===idx?' active':'');
      d.onclick = () => goTo(i);
      d.title = SCREENS[i].label;
      dotsEl.appendChild(d);
    });
  }, [idx, goTo]);

  const Screen = SCREENS[idx].component;
  return (
    <div style={{width:'100%',height:'100%',position:'relative'}}>
      <Screen onNext={next}/>
      {/* Prev/Next arrows */}
      {idx > 0 && (
        <button onClick={()=>goTo(idx-1)} style={{
          position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',
          width:36,height:36,borderRadius:'50%',background:'rgba(0,0,0,0.3)',
          border:'none',color:'#fff',fontSize:18,cursor:'pointer',zIndex:50,
          display:'flex',alignItems:'center',justifyContent:'center',
        }}>‹</button>
      )}
      {idx < SCREENS.length-1 && (
        <button onClick={()=>goTo(idx+1)} style={{
          position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',
          width:36,height:36,borderRadius:'50%',background:'rgba(0,0,0,0.3)',
          border:'none',color:'#fff',fontSize:18,cursor:'pointer',zIndex:50,
          display:'flex',alignItems:'center',justifyContent:'center',
        }}>›</button>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app-shell'));
root.render(<App/>);
</script>
</body>
</html>
